<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الساعات المعتمدة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@300;400;500;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#07050f;
    --purple-deep:#180a34;
    --purple:#3d1a6b;
    --purple-mid:#5b2e9e;
    --blue-deep:#12204a;
    --blue:#3c62c9;
    --lavender:#9b6dd6;
    --lavender-soft:#c9a8f0;
    --white:#f8f6fc;
    --white-dim:rgba(248,246,252,0.72);
    --glass:rgba(24,10,52,0.45);
    --glass-border:rgba(201,168,240,0.25);
    --font-display:'Cairo', sans-serif;
    --font-body:'Tajawal', sans-serif;
    --font-signature:'Great Vibes', cursive;
  }

  *{ box-sizing:border-box; }

  html,body{ height:100%; margin:0; }

  body{
    font-family:var(--font-body);
    background:var(--black);
    color:var(--white);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
    padding:24px 16px;
  }

  /* ===== Cinematic cosmic canvas background ===== */
  #cosmos{
    position:fixed;
    inset:0;
    z-index:0;
    width:100vw;
    height:100vh;
    display:block;
    background:radial-gradient(ellipse at 50% 0%, #150b2c 0%, var(--black) 62%);
  }

  /* ===== Layout ===== */
  .stage{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
  }

  .container{
    background:var(--glass);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid var(--glass-border);
    padding:38px 28px 28px;
    border-radius:22px;
    text-align:center;
    width:92%;
    max-width:420px;
    box-shadow:0 8px 30px rgba(0,0,0,0.45);
    transition:transform 0.45s cubic-bezier(.2,.8,.2,1), box-shadow 0.45s cubic-bezier(.2,.8,.2,1);
  }

  .container:hover{
    transform:translateY(-10px);
    box-shadow:
      0 25px 60px rgba(0,0,0,0.55),
      0 0 45px 6px rgba(155,109,214,0.45),
      0 0 90px 12px rgba(60,98,201,0.28);
  }

  /* Used only for the instant of html2canvas capture: swaps the glassy,
     transparent look for a solid, rich background so the exported PNG
     is vibrant instead of a washed-out grey. */
  .container.capturing{
    background:linear-gradient(160deg, #1e112a, #13091e) !important;
    backdrop-filter:none !important;
    -webkit-backdrop-filter:none !important;
    box-shadow:
      0 25px 60px rgba(0,0,0,0.55),
      0 0 45px 6px rgba(155,109,214,0.45),
      0 0 90px 12px rgba(60,98,201,0.28) !important;
  }

  /* html2canvas cannot render background-clip:text / gradient text-fill,
     which otherwise shows the title and signature as blank/clipped blocks
     in the exported PNG. Force solid, visible text just for the capture. */
  .container.capturing h1,
  .container.capturing .footer{
    background:none !important;
    -webkit-background-clip:initial !important;
    background-clip:initial !important;
    -webkit-text-fill-color:#ffffff !important;
    color:#ffffff !important;
    text-shadow:none !important;
    animation:none !important;
    /* Forces connected Arabic script inside html2canvas */
    letter-spacing: normal !important;
    word-spacing: normal !important;
  }

  h1{
    font-family:var(--font-display);
    font-weight:800;
    font-size:22px;
    margin:0 0 26px;
    /* Fixed: Removed 0.3px letter spacing that broken the entire title in Arabic */
    letter-spacing: normal;
    background:linear-gradient(90deg, var(--white), var(--lavender-soft));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .field{ text-align:right; margin-bottom:14px; }

  label{
    display:block;
    font-size:12.5px;
    color:var(--white-dim);
    margin-bottom:6px;
    font-weight:500;
    padding-right:2px;
  }

  input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid rgba(201,168,240,0.3);
    background:rgba(10,6,18,0.4);
    color:var(--white);
    font-size:15px;
    font-family:var(--font-body);
    outline:none;
    transition:border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }

  input::placeholder{ color:rgba(248,246,252,0.4); }

  input:focus{
    border-color:var(--lavender);
    box-shadow:0 0 0 3px rgba(155,109,214,0.25);
    background:rgba(10,6,18,0.6);
  }

  .result{
    margin-top:18px;
    font-size:17px;
    line-height:1.7;
    min-height:1px;
  }

  .success{ color:#8ff0b0; }
  .fail{ color:#ff8a8a; }

  .motivation{
    margin-top:16px;
    padding:16px 16px 14px;
    border-radius:16px;
    background:linear-gradient(150deg, rgba(91,46,158,0.35), rgba(10,6,18,0.35));
    border:1px solid rgba(201,168,240,0.35);
    position:relative;
    overflow:hidden;
    text-align:right;
    animation:reveal 0.6s cubic-bezier(.2,.8,.2,1);
  }

  .motivation::before{
    content:"";
    position:absolute;
    top:-40%; right:-30%;
    width:60%; height:180%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.08), transparent);
    transform:rotate(20deg);
    pointer-events:none;
  }

  @keyframes reveal{
    from{ opacity:0; transform:translateY(10px) scale(0.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .motivation .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:var(--font-display);
    font-weight:700;
    font-size:12px;
    color:var(--lavender-soft);
    letter-spacing:0.4px;
    margin-bottom:8px;
  }

  .motivation p{
    margin:0;
    font-size:14.5px;
    line-height:1.9;
    color:var(--white);
    font-weight:400;
  }

  .btn-container{
    margin-top:22px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
  }

  button{
    padding:11px 18px;
    font-size:14.5px;
    font-family:var(--font-body);
    font-weight:700;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:var(--white);
    transition:transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
  }

  button:hover{ transform:translateY(-2px); filter:brightness(1.08); }
  button:active{ transform:translateY(0); }

  .btn-show{ background:linear-gradient(135deg, var(--lavender), var(--purple-mid)); box-shadow:0 4px 16px rgba(91,46,158,0.5); }
  .btn-reset{ background:linear-gradient(135deg, #6b2440, #3a1220); box-shadow:0 4px 16px rgba(107,36,64,0.4); }
  .btn-save{ background:linear-gradient(135deg, #2c5f8a, #1a3a56); box-shadow:0 4px 16px rgba(44,95,138,0.4); }

  .footer{
    margin-top:24px;
    padding-top:4px;
    font-size:24px;
    line-height:1.3;
    font-family:var(--font-signature);
    font-weight:400;
    font-style:normal;
    letter-spacing:1.2px;
    direction:ltr;
    unicode-bidi:isolate;
    background:linear-gradient(90deg, var(--purple-deep), var(--lavender-soft) 30%, var(--white) 50%, var(--blue) 72%, var(--purple-deep));
    background-size:250% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 18px rgba(155,109,214,0.35), 0 0 36px rgba(60,98,201,0.18);
    animation:shine 7s linear infinite;
  }

  @keyframes shine{
    0%{ background-position:0% center; }
    100%{ background-position:250% center; }
  }

  @media (max-width:400px){
    h1{ font-size:19px; }
    .container{ padding:30px 18px 22px; }
  }
</style>
</head>
<body>

  <canvas id="cosmos" aria-hidden="true"></canvas>

  <div class="stage">
    <div class="container" id="captureArea">
      <h1>نظام الساعات المعتمدة</h1>

      <div class="field">
        <label for="nameInput">اسم الطالب (اختياري)</label>
        <input type="text" id="nameInput" placeholder="اكتب اسمك هنا">
      </div>

      <div class="field">
        <label for="gpaInput">المعدل التراكمي (GPA)</label>
        <input type="number" id="gpaInput" placeholder="أدخل الـ GPA (من 0 إلى 4)" step="0.01" min="0" max="4">
      </div>

      <div id="result" class="result"></div>
      <div id="motivationBox"></div>

      <div class="btn-container">
        <button class="btn-show" onclick="showResult()">عرض التقدير</button>
        <button class="btn-reset" onclick="reset()">إعادة</button>
        <button class="btn-save" onclick="saveAsImage()">حفظ النتيجة كصورة</button>
      </div>

      <div class="footer">Created by: A'laa Salah</div>
    </div>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    // ==========================================================
    // Cinematic cosmic background — canvas particle/nebula engine
    // ==========================================================
    (function(){
      const canvas = document.getElementById('cosmos');
      const ctx = canvas.getContext('2d', { alpha:false });
      const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      let dpr = Math.min(window.devicePixelRatio || 1, 2);
      let W = 0, H = 0;
      let nebulae = [];
      let stars = [];
      let dust = [];
      let shootingStars = [];
      let animId = null;
      let lastTime = 0;
      let running = true;

      const NEBULA_COLORS = [
        { r:61,  g:26,  b:107 }, // purple
        { r:91,  g:46,  b:158 }, // purple-mid
        { r:36,  g:14,  b:68  }, // deep purple-black
        { r:20,  g:8,   b:36  }, // near-black violet
        { r:70,  g:32,  b:120 }  // muted violet
      ];

      function rand(min, max){ return Math.random() * (max - min) + min; }

      function densityFactor(){
        const area = window.innerWidth * window.innerHeight;
        return Math.max(0.4, Math.min(1, area / (1440 * 900)));
      }

      function buildNebulae(){
        nebulae = [];

        // Far layer: huge, barely-moving gaseous clouds deep in the background
        const farCount = 3;
        for(let i=0;i<farCount;i++){
          const c = NEBULA_COLORS[i % NEBULA_COLORS.length];
          nebulae.push({
            x: rand(0, W),
            y: rand(0, H),
            baseR: rand(Math.min(W,H)*0.42, Math.min(W,H)*0.65),
            color: c,
            phase: rand(0, Math.PI*2),
            speed: rand(0.00004, 0.00008),
            driftX: rand(-0.005, 0.005),
            driftY: rand(-0.004, 0.004),
            opacity: rand(0.06, 0.11),
            layer:'far'
          });
        }

        // Near layer: smaller, slightly brighter, drifts and morphs a bit more visibly
        const nearCount = 4;
        for(let i=0;i<nearCount;i++){
          const c = NEBULA_COLORS[(i + 2) % NEBULA_COLORS.length];
          nebulae.push({
            x: rand(0, W),
            y: rand(0, H),
            baseR: rand(Math.min(W,H)*0.22, Math.min(W,H)*0.38),
            color: c,
            phase: rand(0, Math.PI*2),
            speed: rand(0.00007, 0.00015),
            driftX: rand(-0.014, 0.014),
            driftY: rand(-0.011, 0.011),
            opacity: rand(0.10, 0.17),
            layer:'near'
          });
        }
      }

      // Depth layers for the parallax starfield: farthest stars are tiny, dim,
      // and drift the slowest; nearest stars are bigger, brighter, and drift fastest.
      const STAR_LAYERS = [
        { key:'far',  countFactor:0.55, rRange:[0.35, 0.8], opacityRange:[0.20, 0.55], speedRange:[0.0015, 0.0035], orbitRange:[3, 10]  },
        { key:'mid',  countFactor:0.32, rRange:[0.7,  1.4], opacityRange:[0.35, 0.75], speedRange:[0.0035, 0.007], orbitRange:[6, 18]  },
        { key:'near', countFactor:0.16, rRange:[1.2,  2.3], opacityRange:[0.55, 1.0],  speedRange:[0.007,  0.015], orbitRange:[10, 26] }
      ];

      function buildStars(){
        const baseCount = Math.round(170 * densityFactor()) * (reduceMotion ? 0.5 : 1);
        stars = [];

        // A shared, gentle diagonal drift direction so layers feel like one
        // coherent field moving through space, just at different depths/speeds.
        const driftAngle = rand(0.4, 1.1);
        const dirX = Math.cos(driftAngle);
        const dirY = Math.sin(driftAngle);

        STAR_LAYERS.forEach(layer => {
          const count = Math.round(baseCount * layer.countFactor);
          for(let i=0;i<count;i++){
            const speed = rand(layer.speedRange[0], layer.speedRange[1]);
            stars.push({
              x: rand(0, W),
              y: rand(0, H),
              r: rand(layer.rRange[0], layer.rRange[1]),
              baseOpacity: rand(layer.opacityRange[0], layer.opacityRange[1]),
              phase: rand(0, Math.PI*2),
              pulseSpeed: rand(0.0006, 0.0018),
              angle: rand(0, Math.PI*2),
              angleSpeed: rand(-0.00025, 0.00025),
              orbit: rand(layer.orbitRange[0], layer.orbitRange[1]),
              vx: dirX * speed * (reduceMotion ? 0 : 1),
              vy: dirY * speed * (reduceMotion ? 0 : 1),
              cx: 0, cy: 0,
              layer: layer.key,
              hue: Math.random() < 0.15 ? 'blue' : (Math.random() < 0.3 ? 'lavender' : 'white')
            });
          }
        });

        stars.forEach(s => { s.cx = s.x; s.cy = s.y; });
      }

      function buildDust(){
        const count = Math.round(50 * densityFactor()) * (reduceMotion ? 0.5 : 1);
        dust = [];
        for(let i=0;i<count;i++){
          dust.push({
            x: rand(0, W),
            y: rand(0, H),
            r: rand(1, 2.6),
            baseOpacity: rand(0.05, 0.16),
            vx: rand(-0.008, 0.008),
            vy: rand(-0.006, 0.006),
            phase: rand(0, Math.PI*2),
            pulseSpeed: rand(0.0003, 0.0009)
          });
        }
      }

      function resize(){
        W = window.innerWidth;
        H = window.innerHeight;
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        buildNebulae();
        buildStars();
        buildDust();
      }

      function maybeSpawnShootingStar(t){
        if (reduceMotion) return;
        if (Math.random() < 0.0022 && shootingStars.length < 2){
          const startX = rand(W*0.05, W*0.75);
          const startY = rand(0, H*0.35);
          const angle = rand(0.35, 0.75); // radians, downward-right-ish
          const speed = rand(9, 14);
          shootingStars.push({
            x:startX, y:startY,
            vx: Math.cos(angle)*speed,
            vy: Math.sin(angle)*speed,
            life: 0,
            maxLife: rand(45, 70),
            len: rand(90, 150)
          });
        }
      }

      function drawNebulae(t){
        for(const n of nebulae){
          n.x += n.driftX;
          n.y += n.driftY;
          if (n.x < -n.baseR) n.x = W + n.baseR;
          if (n.x > W + n.baseR) n.x = -n.baseR;
          if (n.y < -n.baseR) n.y = H + n.baseR;
          if (n.y > H + n.baseR) n.y = -n.baseR;

          const pulse = 1 + Math.sin(t * n.speed + n.phase) * 0.12;
          const r = n.baseR * pulse;

          const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r);
          grad.addColorStop(0, `rgba(${n.color.r},${n.color.g},${n.color.b},${n.opacity})`);
          grad.addColorStop(1, `rgba(${n.color.r},${n.color.g},${n.color.b},0)`);

          ctx.globalCompositeOperation = 'lighter';
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(n.x, n.y, r, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalCompositeOperation = 'source-over';
      }

      function starColor(hue, alpha){
        if (hue === 'blue') return `rgba(150,180,255,${alpha})`;
        if (hue === 'lavender') return `rgba(201,168,240,${alpha})`;
        return `rgba(248,246,252,${alpha})`;
      }

      function drawStars(t){
        ctx.globalCompositeOperation = 'lighter';
        for(const s of stars){
          s.angle += s.angleSpeed;

          // Parallax drift: deeper stars crawl, nearer stars glide noticeably faster
          s.cx += s.vx;
          s.cy += s.vy;
          const pad = 20;
          if (s.cx < -pad) s.cx = W + pad;
          if (s.cx > W + pad) s.cx = -pad;
          if (s.cy < -pad) s.cy = H + pad;
          if (s.cy > H + pad) s.cy = -pad;

          const x = s.cx + Math.cos(s.angle) * s.orbit * 0.05;
          const y = s.cy + Math.sin(s.angle) * s.orbit * 0.05;
          const pulse = 0.55 + Math.sin(t * s.pulseSpeed + s.phase) * 0.45;
          const alpha = Math.max(0, s.baseOpacity * pulse);

          const glowR = s.r * 3.2;
          const grad = ctx.createRadialGradient(x, y, 0, x, y, glowR);
          grad.addColorStop(0, starColor(s.hue, alpha));
          grad.addColorStop(1, starColor(s.hue, 0));
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(x, y, glowR, 0, Math.PI*2);
          ctx.fill();

          ctx.fillStyle = starColor(s.hue, Math.min(1, alpha + 0.25));
          ctx.beginPath();
          ctx.arc(x, y, s.r, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalCompositeOperation = 'source-over';
      }

      function drawDust(t){
        ctx.globalCompositeOperation = 'lighter';
        for(const d of dust){
          d.x += d.vx;
          d.y += d.vy;
          if (d.x < -10) d.x = W + 10;
          if (d.x > W + 10) d.x = -10;
          if (d.y < -10) d.y = H + 10;
          if (d.y > H + 10) d.y = -10;

          const pulse = 0.6 + Math.sin(t * d.pulseSpeed + d.phase) * 0.4;
          const alpha = Math.max(0, d.baseOpacity * pulse);
          ctx.fillStyle = `rgba(201,168,240,${alpha})`;
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalCompositeOperation = 'source-over';
      }

      function drawShootingStars(){
        ctx.globalCompositeOperation = 'lighter';
        for(let i = shootingStars.length - 1; i >= 0; i--){
          const s = shootingStars[i];
          s.x += s.vx;
          s.y += s.vy;
          s.life++;

          const progress = s.life / s.maxLife;
          const alpha = Math.sin(progress * Math.PI); // fade in then out

          const tailX = s.x - s.vx * (s.len / Math.hypot(s.vx, s.vy));
          const tailY = s.y - s.vy * (s.len / Math.hypot(s.vx, s.vy));

          const grad = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
          grad.addColorStop(0, `rgba(248,246,252,${alpha})`);
          grad.addColorStop(1, `rgba(155,180,255,0)`);

          ctx.strokeStyle = grad;
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(tailX, tailY);
          ctx.stroke();

          if (s.life >= s.maxLife || s.x > W + 50 || s.y > H + 50){
            shootingStars.splice(i, 1);
          }
        }
        ctx.globalCompositeOperation = 'source-over';
      }

      function frame(now){
        if (!running) return;
        if (!lastTime) lastTime = now;
        lastTime = now;

        ctx.fillStyle = '#07050f';
        ctx.fillRect(0, 0, W, H);

        drawNebulae(now);
        drawDust(now);
        drawStars(now);
        maybeSpawnShootingStar(now);
        drawShootingStars();

        animId = requestAnimationFrame(frame);
      }

      function start(){
        if (animId) cancelAnimationFrame(animId);
        running = true;
        animId = requestAnimationFrame(frame);
      }

      function stop(){
        running = false;
        if (animId) cancelAnimationFrame(animId);
      }

      // Pause when tab is hidden to save CPU/battery
      document.addEventListener('visibilitychange', function(){
        if (document.hidden) stop(); else start();
      });

      let resizeTimer;
      window.addEventListener('resize', function(){
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(resize, 150);
      });

      resize();
      start();
    })();

    // ---------- Gender-aware motivational messages ----------
    const maleNames = ["احمد","أحمد","محمد","مُحمد","علي","عليّ","عمر","خالد","يوسف","ابراهيم","إبراهيم",
      "حسن","حسين","عبدالله","عبد الله","عبدالرحمن","عبد الرحمن","طارق","كريم","مصطفى","محمود",
      "سامي","وليد","ياسر","أيمن","هشام","زياد","فادي","مازن","باسل","رامي","معاذ","سيف",
      "فيصل","سلطان","بندر","ماجد","نبيل","جمال","سامر","شادي","تامر","وائل","إياد","رضا",
      "أنس","انس","عادل","سعيد","صالح","نايف","تركي","بدر","فهد","ناصر","جابر","عثمان",
      "بلال","حمزة","يحيى","إسماعيل","اسماعيل","كمال","رائد","رشيد","أسامة","اسامة"];

    const femaleNames = ["فاطمة","فاطمه","مريم","سارة","ساره","عائشة","عايشة","خديجة","خديجه","زينب",
      "ليلى","هدى","امل","أمل","رنا","دينا","ياسمين","منى","سلمى","ريم","دانا","جنى","لينا",
      "رهف","شهد","جود","لمى","ملك","تالا","جوري","رغد","سمر","هبة","هبه","بتول","اية","آية",
      "اسراء","إسراء","دعاء","رحاب","غادة","غاده","وفاء","نجلاء","سناء","فرح","لجين","نورهان",
      "روان","تسنيم","رزان","بيان","دانية","دانيه","جيهان","سلوى","نادين","ديما","ياسمين"];

    const unisexNames = ["نور","وسام","عصمت","حياة","حياه","كرم","سلام","أمان","امان","عهد",
      "رفيف","إخلاص","اخلاص","إيمان","ايمان","علاء","عصام"];

    function normalizeArabic(str){
      return str
        .trim()
        .replace(/[\u064B-\u065F\u0670]/g, "") // strip tashkeel/diacritics
        .replace(/[إأآا]/g, "ا")
        .replace(/ة/g, "ه");
    }

    function buildLookup(list){
      const set = new Set();
      list.forEach(n => set.add(normalizeArabic(n)));
      return set;
    }

    const maleSet = buildLookup(maleNames);
    const femaleSet = buildLookup(femaleNames);
    const unisexSet = buildLookup(unisexNames);

    function detectGender(rawName){
      const firstToken = rawName.trim().split(/\s+/)[0] || "";
      const key = normalizeArabic(firstToken);
      if (!key) return null;
      if (unisexSet.has(key)) return "neutral";
      if (maleSet.has(key)) return "male";
      if (femaleSet.has(key)) return "female";
      return "neutral";
    }

    function motivationMessage(name, gender){
      if (gender === "male"){
        return `يا ${name}، أنت لست مجرد رقم في معادلة... أنت صانع مستقبل! هذا التقدير انعكاسٌ لجهدك، فاجعله وقودًا يدفعك نحو قممٍ أعلى. المستقبل ملكٌ للطموحين أمثالك.`;
      }
      if (gender === "female"){
        return `يا ${name}، أنتِ لست مجرد رقم في معادلة... أنتِ صانعة مستقبل! هذا التقدير انعكاسٌ لجهدك، فاجعليه وقودًا يدفعك نحو قممٍ أعلى. المستقبل ملكٌ للطموحات أمثالكِ.`;
      }
      return `لا يمكن لأي تقدير أن يختصر الإمكانيات الحقيقية لـ ${name}. كل رقم هو مجرد محطة في رحلة أطول نحو التميز، والطريق إلى القمة يُبنى بالإصرار والعمل الدؤوب. المستقبل ينتظر أصحاب الطموح!`;
    }

    // ---------- Original GPA logic (unchanged) ----------
    function showResult() {
      const gpa = parseFloat(document.getElementById("gpaInput").value);
      const resultDiv = document.getElementById("result");
      const motivationBox = document.getElementById("motivationBox");

      if (isNaN(gpa) || gpa < 0 || gpa > 4) {
        resultDiv.innerHTML = '<span class="fail">برجاء إدخال GPA صحيح بين 0 و 4</span>';
        motivationBox.innerHTML = "";
        return;
      }

      const percentage = (gpa * 25).toFixed(2);
      let grade = "", letter = "", colorClass = "success";

      if (gpa === 4.0) {
        grade = "امتياز مرتفع"; letter = "A+";
      } else if (gpa >= 3.7) {
        grade = "امتياز"; letter = "A";
      } else if (gpa >= 3.3) {
        grade = "جيد جدًا مرتفع"; letter = "B+";
      } else if (gpa >= 3.0) {
        grade = "جيد جدًا"; letter = "B";
      } else if (gpa >= 2.7) {
        grade = "بداية جيد جدًا"; letter = "B-";
      } else if (gpa >= 2.3) {
        grade = "جيد مرتفع"; letter = "C+";
      } else if (gpa >= 2.0) {
        grade = "جيد"; letter = "C";
      } else if (gpa >= 1.7) {
        grade = "بداية جيد"; letter = "C-";
      } else if (gpa >= 1.3) {
        grade = "مقبول مرتفع"; letter = "D+";
      } else if (gpa >= 1.0) {
        grade = "مقبول"; letter = "D";
      } else {
        grade = "راسب"; letter = "F"; colorClass = "fail";
      }

      resultDiv.innerHTML = `<span class="${colorClass}">التقدير: ${grade} (${letter})<br>النسبة المئوية: ${percentage}%</span>`;

      // ---- Optional name-based motivational message ----
      const nameRaw = document.getElementById("nameInput").value.trim();
      if (nameRaw){
        const gender = detectGender(nameRaw);
        const message = motivationMessage(nameRaw, gender);
        motivationBox.innerHTML = `
          <div class="motivation">
            <p>${message}</p>
          </div>`;
      } else {
        motivationBox.innerHTML = "";
      }
    }

    function reset() {
      document.getElementById("gpaInput").value = "";
      document.getElementById("nameInput").value = "";
      document.getElementById("result").innerHTML = "";
      document.getElementById("motivationBox").innerHTML = "";
    }

    function saveAsImage() {
      const container = document.getElementById("captureArea");
      // Add the styling fix class before taking a screenshot to prevent washed out grey colors
      container.classList.add("capturing");

      html2canvas(container, {
        useCORS: true,
        allowTaint: true,
        scale: 2 // Keeps the exported image crisp and high resolution
      }).then(canvas => {
        let link = document.createElement("a");
        link.download = "gpa_result.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
        
        // Instantly remove capturing class so UI returns to normal interactive glassmorphism
        container.classList.remove("capturing");
      }).catch(err => {
        console.error("Oops, screenshot failed:", err);
        container.classList.remove("capturing");
      });
    }
  </script>
